<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经典品读学习交流平台</title>
  <script src="js/tailwind.js"></script>
  <script src="js/supabase.min.js"></script>
  <link href="https://fonts.googleapis.cn/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[var(--bg)] text-[var(--fg)] min-h-screen">
  <div id="navbar"></div>
  <div id="nickname-modal-container"></div>

  <!-- Hero区域 -->
  <section class="relative overflow-hidden py-16 md:py-24">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <h1 class="text-3xl md:text-5xl font-bold text-[var(--primary)] mb-4" style="font-family:'Noto Serif SC',serif;">
        经典品读
      </h1>
      <p class="text-lg text-[var(--muted)] max-w-2xl mx-auto leading-relaxed">
        阅读 · 思考 · 交流 · 成长<br>在经典中汲取智慧，在交流中碰撞思想
      </p>
    </div>
  </section>

  <!-- 阅读进度 -->
  <section class="max-w-6xl mx-auto px-4 mb-8" id="progress-section" style="display:none">
    <div class="bg-white rounded-xl border border-[var(--border)] p-6">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-semibold text-[var(--fg)]">我的阅读进度</span>
        <span class="text-sm text-[var(--accent)]" id="progress-text">0 / 0 篇</span>
      </div>
      <div class="w-full bg-[var(--border)] rounded-full h-3">
        <div id="progress-bar" class="bg-[var(--accent)] h-3 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
      <div class="flex gap-3 mt-4 flex-wrap" id="badges-container"></div>
    </div>
  </section>

  <!-- 公告 -->
  <section class="max-w-6xl mx-auto px-4 mb-8" id="announcement-section" style="display:none">
    <div class="bg-[#FFF8F0] rounded-xl border border-[var(--border)] p-4 flex items-start gap-3">
      <span class="text-xl">📢</span>
      <div>
        <p class="text-sm font-semibold text-[var(--primary)]" id="announcement-title"></p>
        <p class="text-sm text-[var(--muted)]" id="announcement-content"></p>
      </div>
    </div>
  </section>

  <!-- 经典篇目 -->
  <section class="max-w-6xl mx-auto px-4 pb-16">
    <h2 class="text-2xl font-bold text-[var(--primary)] mb-6" style="font-family:'Noto Serif SC',serif;">经典篇目</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="articles-grid">
      <p class="text-[var(--muted)] col-span-3 text-center py-12">加载中...</p>
    </div>
  </section>

  <!-- 阅读排行榜 -->
  <section class="max-w-6xl mx-auto px-4 pb-16" id="leaderboard-section" style="display:none">
    <h2 class="text-2xl font-bold text-[var(--primary)] mb-6" style="font-family:'Noto Serif SC',serif;">阅读排行</h2>
    <div class="bg-white rounded-xl border border-[var(--border)] p-6" id="leaderboard-list"></div>
  </section>

  <script src="js/app.js"></script>
  <script>
    highlightNav('index');
    loadIndexPage();

    // 用户设置昵称后也加载页面内容
    window.onPageUserReady = function(user) {
      loadUserDependentData();
    };

    async function loadIndexPage() {
      await initApp();
      if (!dbReady) return; // 数据库未就绪，initDb已显示错误提示
      highlightNav('index');

      // 加载篇目（不需要登录）
      const { data: articles, error } = await db.from('articles').select('*').order('sort_order', { ascending: true });
      const grid = document.getElementById('articles-grid');

      if (error || !articles || articles.length === 0) {
        grid.innerHTML = '<p class="text-[var(--muted)] col-span-3 text-center py-12">暂无篇目</p>';
        return;
      }

      let readIds = new Set();
      if (currentUser) {
        const { data: records } = await db.from('reading_records').select('article_id').eq('user_id', currentUser.id);
        if (records) records.forEach(r => readIds.add(r.article_id));
        loadUserDependentData();
      }

      const gradients = [
        'from-red-800 to-amber-700', 'from-amber-800 to-yellow-700',
        'from-emerald-800 to-teal-700', 'from-blue-900 to-slate-700',
        'from-purple-900 to-indigo-700', 'from-rose-800 to-pink-700'
      ];

      grid.innerHTML = articles.map((a, i) => {
        const isRead = readIds.has(a.id);
        const gradient = gradients[i % gradients.length];
        return `
        <a href="article.html?id=${a.id}" class="group block bg-white rounded-xl border border-[var(--border)] overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-all duration-300 no-underline">
          <div class="h-40 bg-gradient-to-br ${gradient} flex items-center justify-center relative">
            <span class="text-white/90 text-lg font-bold px-4 text-center" style="font-family:'Noto Serif SC',serif;">${a.title}</span>
            ${isRead ? '<span class="absolute top-3 right-3 bg-green-500 text-white text-xs px-2 py-1 rounded-full">已读</span>' : '<span class="absolute top-3 right-3 bg-white/30 text-white text-xs px-2 py-1 rounded-full">未读</span>'}
          </div>
          <div class="p-4">
            <h3 class="font-bold text-[var(--fg)] mb-1 group-hover:text-[var(--primary)] transition-colors" style="font-family:'Noto Serif SC',serif;">${a.title}</h3>
            <p class="text-sm text-[var(--secondary)] mb-2">${a.author}</p>
            <p class="text-sm text-[var(--muted)] line-clamp-2">${a.description || ''}</p>
          </div>
        </a>`;
      }).join('');
    }

    async function loadUserDependentData() {
      if (!currentUser) return;

      // 阅读进度
      const { data: articles } = await db.from('articles').select('id').order('sort_order');
      const { data: records } = await db.from('reading_records').select('article_id').eq('user_id', currentUser.id);
      const total = articles ? articles.length : 0;
      const read = records ? records.length : 0;
      document.getElementById('progress-text').textContent = `${read} / ${total} 篇`;
      document.getElementById('progress-bar').style.width = total > 0 ? `${(read / total * 100)}%` : '0%';
      document.getElementById('progress-section').style.display = 'block';

      // 徽章
      const badges = [
        { min: 1, name: '初读者', icon: '📖' },
        { min: 3, name: '思考者', icon: '💡' },
        { min: 5, name: '品读者', icon: '🎯' },
        { min: 6, name: '经典达人', icon: '🏆' },
      ];
      document.getElementById('badges-container').innerHTML = badges.filter(b => read >= b.min).map(b =>
        `<span class="inline-flex items-center gap-1 bg-[#FFF8F0] text-[var(--accent)] text-xs px-3 py-1 rounded-full border border-[var(--border)]">${b.icon} ${b.name}</span>`
      ).join('');

      // 排行榜
      const { data: lbData } = await db.from('reading_records').select('user_id, users(nickname)');
      if (lbData && lbData.length > 0) {
        const counts = {};
        lbData.forEach(r => {
          const nick = Array.isArray(r.users) ? (r.users[0]?.nickname || '未知') : (r.users?.nickname || '未知');
          counts[nick] = (counts[nick] || 0) + 1;
        });
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 5);
        if (sorted.length > 0) {
          document.getElementById('leaderboard-section').style.display = 'block';
          document.getElementById('leaderboard-list').innerHTML = sorted.map(([name, count], i) =>
            `<div class="flex items-center justify-between py-2 ${i > 0 ? 'border-t border-[var(--border)]' : ''}">
              <span class="flex items-center gap-2"><span class="text-lg">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span><span class="text-sm font-medium">${name}</span></span>
              <span class="text-sm text-[var(--accent)]">${count} 篇</span>
            </div>`
          ).join('');
        }
      }

      // 公告
      const { data: announcements } = await db.from('announcements').select('*, users(nickname)').order('created_at', { ascending: false }).limit(1);
      if (announcements && announcements.length > 0) {
        const ann = announcements[0];
        document.getElementById('announcement-title').textContent = ann.title;
        document.getElementById('announcement-content').textContent = ann.content;
        document.getElementById('announcement-section').style.display = 'block';
      }
    }
  </script>
</body>
</html>
